# Database Connectivity Setup
spring.datasource.url=jdbc:postgresql://localhost:5432/milk_cooperative_management_system
spring.datasource.username=postgres
spring.datasource.password=1932005337
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Object Management Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 💡 CHANGED FROM 'validate' TO 'create' TO FORCE SCHEMA REBUILD TONIGHT
spring.jpa.hibernate.ddl-auto=update 

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Prevent Jackson from failing when it encounters Hibernate lazy-loading proxies
spring.jackson.serialization.fail-on-empty-beans=false